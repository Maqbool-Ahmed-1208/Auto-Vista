name: Keep Private HF Space Alive

on:
  schedule:
    - cron: "* * * * *"

  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Private HF Space
        env:
          HF_SPACE_URL: ${{ secrets.HF_SPACE_URL }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

        run: |
          echo "Pinging private space..."

          for i in {1..3}; do

            status=$(curl -L -s \
              -o /dev/null \
              -w "%{http_code}" \
              -H "Authorization: Bearer $HF_TOKEN" \
              "$HF_SPACE_URL")

            echo "Attempt $i → HTTP $status"

            if [ "$status" -eq 200 ]; then
              echo "Space is alive"
              exit 0
            fi

            sleep 10
          done

          echo "Space unreachable"
          exit 1